<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Peminjaman Laptop</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('login.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .login-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 35px;
            width: 360px;
            background-color: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            padding-bottom: 15px;
            border-bottom: 3px solid #3498db;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-subtitle {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 400;
            opacity: 0.95;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background-color: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid #3498db;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .form-input:focus {
            background-color: rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid #64b5f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            border: none;
            background-color: #3498db;
            font-size: 16px;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .login-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-links {
            text-align: center;
            color: white;
            font-size: 14px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
            opacity: 0.9;
        }

        .login-links a:hover {
            color: #3498db;
            text-decoration: underline;
            opacity: 1;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            background: rgba(255, 107, 107, 0.15);
            padding: 5px 10px;
            border-radius: 4px;
            border-left: 3px solid #ff6b6b;
        }

        .success-message {
            color: white;
            font-size: 14px;
            text-align: center;
            background: rgba(46, 204, 113, 0.8);
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 3px solid #2ecc71;
            backdrop-filter: blur(5px);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 25px 20px;
            }
            
            .login-header {
                font-size: 24px;
            }
            
            .login-subtitle {
                font-size: 13px;
            }
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <h1 class="login-header">LOGIN</h1>
    
    <p class="login-subtitle">Sistem Peminjaman Laptop</p>
    
    <!-- Demo alert (untuk tampilan) -->
    <div id="demoAlert" class="success-message" style="display: none;">
        Demo Mode - Koneksi ke backend tidak tersedia
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input 
                id="email" 
                type="email" 
                class="form-input" 
                name="email" 
                required 
                autofocus
                placeholder="email@example.com"
            >
            <div id="emailError" class="error-message" style="display: none;"></div>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input 
                id="password" 
                type="password" 
                class="form-input" 
                name="password" 
                required 
                placeholder="••••••••"
            >
            <div id="passwordError" class="error-message" style="display: none;"></div>
        </div>
        
        <button type="submit" class="login-button" id="loginButton">
            Login
        </button>
    </form>
    
    <div class="login-links">
        <a href="#" id="forgotPassword">Lupa Password?</a>
        <div style="margin-top: 10px;">
            <span style="color: rgba(255, 255, 255, 0.9);">Belum punya akun? </span>
            <a href="#" id="registerLink">Daftar di sini</a>
        </div>
    </div>
</div>

<script>
    // Demo credentials (hanya untuk contoh)
    const demoCredentials = {
        email: 'admin@example.com',
        password: 'admin123'
    };

    // Get DOM elements
    const form = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const demoAlert = document.getElementById('demoAlert');

    // Focus effect for inputs
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('focus', function() {
            this.style.borderBottom = '2px solid #64b5f6';
            this.style.boxShadow = '0 2px 5px rgba(100, 181, 246, 0.3)';
        });
        
        input.addEventListener('blur', function() {
            this.style.borderBottom = '2px solid #3498db';
            this.style.boxShadow = 'none';
        });
    });

    // Handle form submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Reset errors
        emailError.style.display = 'none';
        passwordError.style.display = 'none';
        
        let hasError = false;
        
        // Validate email
        if (!emailInput.value) {
            emailError.textContent = 'Email wajib diisi!';
            emailError.style.display = 'block';
            hasError = true;
        } else if (!emailInput.value.includes('@')) {
            emailError.textContent = 'Masukkan email yang valid!';
            emailError.style.display = 'block';
            hasError = true;
        }
        
        // Validate password
        if (!passwordInput.value) {
            passwordError.textContent = 'Password wajib diisi!';
            passwordError.style.display = 'block';
            hasError = true;
        }
        
        if (hasError) return;
        
        // Show loading state
        loginButton.innerHTML = 'Loading...';
        loginButton.disabled = true;
        loginButton.style.opacity = '0.8';
        loginButton.style.background = '#2980b9';
        
        // Simulate login process (demo)
        setTimeout(() => {
            if (emailInput.value === demoCredentials.email && passwordInput.value === demoCredentials.password) {
                // Success - redirect ke dashboard
                demoAlert.style.display = 'block';
                demoAlert.textContent = 'Login berhasil! Mengarahkan ke dashboard...';
                demoAlert.style.background = 'rgba(46, 204, 113, 0.9)';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                // Failed
                demoAlert.style.display = 'block';
                demoAlert.textContent = 'Login gagal! Email atau password salah.';
                demoAlert.style.background = 'rgba(231, 76, 60, 0.9)';
                
                // Reset button
                loginButton.innerHTML = 'Login';
                loginButton.disabled = false;
                loginButton.style.opacity = '1';
                loginButton.style.background = '#3498db';
                
                // Hide alert after 3 seconds
                setTimeout(() => {
                    demoAlert.style.display = 'none';
                }, 3000);
            }
        }, 1000);
    });
    
    // Forgot password link
    document.getElementById('forgotPassword').addEventListener('click', function(e) {
        e.preventDefault();
        demoAlert.style.display = 'block';
        demoAlert.textContent = 'Fitur reset password: Hubungi admin untuk reset password.';
        demoAlert.style.background = 'rgba(52, 152, 219, 0.9)';
        
        setTimeout(() => {
            demoAlert.style.display = 'none';
        }, 3000);
    });
    
    // Register link
    document.getElementById('registerLink').addEventListener('click', function(e) {
        e.preventDefault();
        demoAlert.style.display = 'block';
        demoAlert.textContent = 'Fitur registrasi: Hubungi admin untuk membuat akun baru.';
        demoAlert.style.background = 'rgba(52, 152, 219, 0.9)';
        
        setTimeout(() => {
            demoAlert.style.display = 'none';
        }, 3000);
    });
</script>

</body>
</html>
