<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Peminjaman Laptop</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
        }

        /* Login Container */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-right: none;
        }

        .form-control {
            border: 1px solid #e0e0e0;
            border-left: none;
            padding: 12px 15px;
            font-size: 14px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #667eea;
        }

        .form-control:focus + .input-group-text {
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .login-links a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-laptop"></i>
                <h1>Sistem Peminjaman Laptop</h1>
                <p>Silakan login untuk melanjutkan</p>
            </div>
            
            <!-- Alert Demo -->
            <div id="demoAlert" class="alert alert-info" style="display: none;">
                <i class="fas fa-info-circle me-2"></i>
                <span id="alertMessage"></span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope me-2"></i>Email
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" 
                               placeholder="admin@example.com" required>
                    </div>
                    <div id="emailError" class="text-danger small mt-1" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" 
                               placeholder="••••••••" required>
                    </div>
                    <div id="passwordError" class="text-danger small mt-1" style="display: none;"></div>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>
            
            <div class="login-links">
                <a href="#" id="forgotLink">
                    <i class="fas fa-question-circle me-1"></i>Lupa Password?
                </a>
                <span class="mx-2 text-muted">|</span>
                <a href="#" id="registerLink">
                    <i class="fas fa-user-plus me-1"></i>Daftar Akun Baru
                </a>
            </div>
            
            <!-- Demo credentials info -->
            <div class="text-center mt-3">
                <small class="text-muted">
                    <i class="fas fa-info-circle"></i> Demo: admin@example.com / admin123
                </small>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Demo credentials
        const demoCredentials = {
            email: 'admin@example.com',
            password: 'admin123'
        };
        
        // Get elements
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const demoAlert = document.getElementById('demoAlert');
        const alertMessage = document.getElementById('alertMessage');
        
        // Show alert function
        function showAlert(message, type = 'info') {
            demoAlert.className = `alert alert-${type}`;
            alertMessage.innerHTML = message;
            demoAlert.style.display = 'block';
            
            setTimeout(() => {
                demoAlert.style.display = 'none';
            }, 3000);
        }
        
        // Form submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset errors
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            
            let hasError = false;
            
            // Validate email
            if (!emailInput.value) {
                emailError.textContent = 'Email wajib diisi!';
                emailError.style.display = 'block';
                hasError = true;
            } else if (!emailInput.value.includes('@')) {
                emailError.textContent = 'Masukkan email yang valid!';
                emailError.style.display = 'block';
                hasError = true;
            }
            
            // Validate password
            if (!passwordInput.value) {
                passwordError.textContent = 'Password wajib diisi!';
                passwordError.style.display = 'block';
                hasError = true;
            }
            
            if (hasError) return;
            
            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Loading...';
            
            // Simulate login
            setTimeout(() => {
                if (emailInput.value === demoCredentials.email && passwordInput.value === demoCredentials.password) {
                    showAlert('Login berhasil! Selamat datang.', 'success');
                    
                    // Redirect ke dashboard (buat file dashboard.html)
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert('Login gagal! Email atau password salah.', 'danger');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
                }
            }, 1000);
        });
        
        // Forgot password
        document.getElementById('forgotLink').addEventListener('click', function(e) {
            e.preventDefault();
            showAlert('Fitur reset password: Hubungi admin untuk reset password.', 'info');
        });
        
        // Register link
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            showAlert('Fitur registrasi: Hubungi admin untuk membuat akun baru.', 'info');
        });
    </script>
</body>
</html>
